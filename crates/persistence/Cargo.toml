[package]
name = "persistence"
edition = "2024"
authors.workspace = true
publish.workspace = true
license.workspace = true

[features]
local_fs = []

[dependencies]
chrono.workspace = true
diesel = { workspace = true, features = [
    "chrono",
    "32-column-tables",
] }
# Ideally, we'd make this an optional dependency, but due to the
# fact that we're enabling the `local_fs` feature in build.rs and not
# via some mechanism that the feature resolver has access to, we can't
# make it optional.
diesel_migrations = "2.2.0"
serde.workspace = true
warp_multi_agent_api.workspace = true

[dev-dependencies]
serde_json.workspace = true
