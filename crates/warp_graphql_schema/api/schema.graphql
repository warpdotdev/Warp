  INTERNAL_ERROR

  """Request is malformed or contains invalid parameters."""
  INVALID_REQUEST

  """Principal lacks permission for the requested operation."""
  NOT_AUTHORIZED

  """Referenced resource does not exist."""
  RESOURCE_NOT_FOUND

