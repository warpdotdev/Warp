name: Verify macOS Warp flake

on:
  push:
    branches:
      - verify-macos-flake-gha
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-launch:
    name: Build and launch ${{ matrix.system }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            system: aarch64-darwin
          - runner: macos-15-intel
            system: x86_64-darwin

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show macOS toolchain
        run: |
          set -euxo pipefail
          sw_vers
          xcodebuild -version
          xcode-select -p
          xcrun --sdk macosx --find metal
          xcrun --sdk macosx --find metallib

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31.7.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Warp macOS app
        id: build
        run: |
          set -euxo pipefail
          nix --version
          nix config show system
          out="$(nix build ".#packages.${{ matrix.system }}.warp-terminal" --print-out-paths -L --accept-flake-config)"
          echo "out=$out" >> "$GITHUB_OUTPUT"

      - name: Inspect app bundle
        run: |
          set -euxo pipefail
          out="${{ steps.build.outputs.out }}"
          app="$out/Applications/WarpOss.app"
          binary="$app/Contents/MacOS/warp-oss"

          test -d "$app"
          test -x "$binary"
          test -s "$app/Contents/Info.plist"
          test -s "$app/Contents/Resources/settings_schema.json"

          file "$binary"
          plutil -p "$app/Contents/Info.plist"
          otool -L "$binary" | sed -n '1,160p'

      - name: Launch app binary briefly
        env:
          HOME: ${{ runner.temp }}/warp-home
        run: |
          bash .github/scripts/smoke-warp-macos-app.sh \
            "${{ steps.build.outputs.out }}/Applications/WarpOss.app" \
            "warp-oss"

      - name: Package DMG
        id: package
        run: |
          set -euxo pipefail
          out="${{ steps.build.outputs.out }}"
          app="$out/Applications/WarpOss.app"
          dmg_dir="$RUNNER_TEMP/warp-dmg"
          staging="$RUNNER_TEMP/warp-dmg-staging"
          dmg="$dmg_dir/WarpOss-${{ matrix.system }}.dmg"

          rm -rf "$dmg_dir" "$staging"
          mkdir -p "$dmg_dir" "$staging"
          ditto "$app" "$staging/WarpOss.app"
          ln -s /Applications "$staging/Applications"

          hdiutil create \
            -volname "WarpOss ${{ matrix.system }}" \
            -srcfolder "$staging" \
            -ov \
            -format UDZO \
            "$dmg"
          ls -lh "$dmg"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"

      - name: Validate DMG contents and launch
        env:
          HOME: ${{ runner.temp }}/warp-dmg-home
        run: |
          set -euxo pipefail
          dmg="${{ steps.package.outputs.dmg }}"
          mount="$RUNNER_TEMP/warp-dmg-mount"

          rm -rf "$mount"
          mkdir -p "$mount"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount" "$dmg"
          trap 'hdiutil detach "$mount" || true' EXIT

          bash .github/scripts/smoke-warp-macos-app.sh \
            "$mount/WarpOss.app" \
            "DMG warp-oss"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: warp-oss-dmg-${{ matrix.system }}
          path: ${{ steps.package.outputs.dmg }}
          if-no-files-found: error
