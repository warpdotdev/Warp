# Default worktree tab config
# Stored in ~/.warp/default_tab_configs/ — you can customize this file!
# Any customizations will apply for any new worktree configs going forward that are created from the "New worktree config" flow
#
# This config is used by the "Worktree in" submenu to quickly create
# worktrees under ~/.warp/worktrees/<repo-name>/<worktree-name> for your
# known repositories.

name = "Worktree"

[[panes]]
id = "main"
type = "{{pane_type}}"
directory = "{{repo}}"
commands = [
  "git worktree add -b {{autogenerated_branch_name}} {{worktree_path_prefix}}{{autogenerated_branch_name}}",
  "cd {{worktree_path_prefix}}{{autogenerated_branch_name}}",
]

[params.repo]
type = "repo"
description = "Repository to create worktree in"

[params.pane_type]
type = "text"
description = "Pane type (terminal or agent)"
default = "terminal"
